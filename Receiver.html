<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>エンゼルウイングからの贈り物</title>

<!-- ===== OGP（LINE等のトークで表示されるプレビュー）===== -->
<!-- 全ギフト共通の1枚でOK。画像は 1200x630px 推奨。 -->
<meta property="og:type" content="website">
<meta property="og:title" content="エンゼルウイングからの贈り物">
<meta property="og:description" content="あなたへ、上質なひとときのギフトが届きました。タップして開いてください。">
<meta property="og:image" content="https://lorelei800-lgtm.github.io/gift/gift-ogp.png">
<meta name="twitter:card" content="summary_large_image">

<style>
  :root{
    --ink:#2c2722; --sub:#8a8076; --gold:#b08d4f; --gold-d:#8a6d35;
    --cream:#f7f1e7; --paper:#fffdf9; --line:#e6dcc9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 80% at 50% 0%, #2a2722 0%, #1c1a17 60%, #141210 100%);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  .stage{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px 18px;}

  /* ---- ローディング ---- */
  #loading{color:#e9dcc0;text-align:center;letter-spacing:.2em;font-size:13px}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#c8aa6e;margin:0 3px;
    animation:bl 1.2s infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,100%{opacity:.3}50%{opacity:1}}

  /* ---- 開封（封筒）---- */
  #opening{cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:18px}
  .env{width:200px;height:132px;background:linear-gradient(180deg,#fbf6ec,#f1e7d2);
    border:1px solid #e2d4b8;border-radius:8px;position:relative;
    box-shadow:0 14px 30px rgba(0,0,0,.45);animation:float 3.2s ease-in-out infinite}
  .env::before{content:"";position:absolute;inset:8px;border:1px solid rgba(176,141,79,.45);border-radius:4px}
  .env .flap{position:absolute;top:0;left:0;right:0;height:68px;
    background:linear-gradient(180deg,#f3e8d0,#ecdcbd);
    clip-path:polygon(0 0,100% 0,50% 100%);border-radius:8px 8px 0 0}
  .env .flap::after{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:rgba(176,141,79,.5)}
  .seal{width:40px;height:40px;border-radius:50%;background:#b9975b;border:1px solid #9c7a3c;
    color:#3a2d12;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;
    position:absolute;left:50%;top:48px;transform:translateX(-50%);letter-spacing:.04em;z-index:2}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .open-ttl{color:#efe2c5;letter-spacing:.18em;font-size:15px;text-align:center}
  .open-sub{color:#b7a98c;font-size:12px;letter-spacing:.16em;font-family:sans-serif}

  /* ---- ギフトカード ---- */
  #card{display:none;width:100%;max-width:380px;animation:rise .9s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(26px) scale(.97)}to{opacity:1;transform:none}}
  .card{
    background:linear-gradient(180deg,var(--paper),var(--cream));
    border:1px solid var(--line);border-radius:20px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.5);
  }
  .card-top{
    background:linear-gradient(135deg,#2c2722,#3c352b);color:#f3e8cf;
    padding:26px 22px 22px;text-align:center;position:relative;
  }
  .frame{position:absolute;inset:10px;border:1px solid rgba(197,167,108,.5);border-radius:14px;pointer-events:none}
  .brand{letter-spacing:.3em;font-size:11px;color:#c8aa6e}
  .for{font-size:12px;color:#c9bda6;margin-top:14px;letter-spacing:.1em}
  .gift-name{font-size:23px;margin:6px 0 2px;color:#fff;font-weight:600}
  .ribbon{width:46px;height:1px;background:#c8aa6e;margin:14px auto 0}

  .card-body{padding:24px 22px 26px;text-align:center}
  .label{font-size:11px;color:var(--sub);letter-spacing:.16em}
  .menu{font-size:20px;color:var(--gold-d);font-weight:600;margin:4px 0 2px}
  .msg{
    background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin:18px 0;color:#4a443c;font-size:14px;line-height:1.8;text-align:left;
    white-space:pre-wrap;
  }
  .msg .from{display:block;text-align:right;color:var(--sub);font-size:12px;margin-top:8px}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);
    border-top:1px dashed var(--line);padding-top:14px;margin-top:6px}
  .code{font-family:ui-monospace,monospace;letter-spacing:.08em;color:var(--ink)}
  .reserve{
    display:block;margin-top:20px;background:linear-gradient(180deg,#bd9a59,#9c7a3c);
    color:#fff;text-decoration:none;text-align:center;font-weight:700;
    padding:16px;border-radius:14px;font-family:sans-serif;font-size:16px;
  }
  .note{font-family:sans-serif;font-size:11px;color:var(--sub);margin-top:14px;line-height:1.7}
  .steps{margin-top:18px;text-align:left;background:#fbf7ef;border:1px solid var(--line);
    border-radius:12px;padding:14px 16px}
  .steps-ttl{font-family:sans-serif;font-size:12px;color:var(--gold-d);letter-spacing:.08em;
    font-weight:700;margin-bottom:8px;text-align:center}
  .steps ol{margin:0;padding-left:1.2em;color:#4a443c;font-size:13px;line-height:1.85;font-family:sans-serif}
  .steps ol b{color:var(--ink)}
  .line-link{display:block;margin-top:12px;text-align:center;background:#06c755;color:#fff;
    text-decoration:none;font-family:sans-serif;font-size:14px;font-weight:700;padding:11px;border-radius:10px}

  /* ---- エラー / 状態 ---- */
  #state{display:none;max-width:360px;width:100%;text-align:center;
    background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:34px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,.45)}
  #state .ic{font-size:40px}
  #state .t{font-size:18px;font-weight:600;margin:10px 0 6px}
  #state .d{font-family:sans-serif;font-size:13px;color:var(--sub);line-height:1.7}
</style>
</head>
<body>
<div class="stage">

  <div id="loading">
    <div style="margin-bottom:14px;letter-spacing:.3em;color:#c8aa6e">ANGEL WINGS</div>
    贈り物を準備しています<span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <div id="opening" onclick="openCard()" style="display:none">
    <div class="env"><div class="flap"></div><div class="seal">AW</div></div>
    <div class="open-ttl">あなたへ、贈り物が届いています</div>
    <div class="open-sub">タップして開く</div>
  </div>

  <div id="card">
    <div class="card">
      <div class="card-top">
        <div class="frame"></div>
        <div class="brand">ANGEL&nbsp;WINGS</div>
        <div class="for">— Gift for You —</div>
        <div class="gift-name" id="cName">ギフト</div>
        <div class="ribbon"></div>
      </div>
      <div class="card-body">
        <div class="label">YOUR EXPERIENCE</div>
        <div class="menu" id="cMenu">—</div>

        <div class="msg" id="cMsgBox" style="display:none">
          <span id="cMsg"></span>
          <span class="from" id="cFrom"></span>
        </div>

        <div class="meta">
          <span>有効期限</span><span id="cExpiry">—</span>
        </div>
        <div class="meta" style="border-top:0;padding-top:6px">
          <span>ギフトコード</span><span class="code" id="cCode">—</span>
        </div>

        <a class="reserve" id="cReserve" href="#" target="_blank" rel="noopener">ご予約はこちら</a>

        <div class="steps">
          <div class="steps-ttl">ご予約の流れ</div>
          <ol>
            <li>上の「ご予約はこちら」から、ご希望の日時をご予約ください。</li>
            <li>ご来店時に、<b>この画面（ギフトコード）</b>をスタッフへお見せください。</li>
          </ol>
          <a class="line-link" id="cLine" href="#" target="_blank" rel="noopener">LINEで相談・ご連絡はこちら</a>
        </div>

        <div class="note">現金との引き換え・払い戻しはできません。</div>
      </div>
    </div>
  </div>

  <div id="state">
    <div class="ic" id="sIc">⚠</div>
    <div class="t" id="sT">—</div>
    <div class="d" id="sD">—</div>
  </div>

</div>

<script>
  // ===== 設定 =====
  // GAS Webアプリの /exec URL（デプロイ後に取得して貼り付け）
  var GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyQWjRO16YKCclatVG4BLNrq82UnSjUBiWy93R1zS2HinZoKrSsZrB8P6mV1_CZB6zveQ/exec'; // TODO

  var giftData = null;

  function getParam(name){
    var m = new RegExp('[?&]'+name+'=([^&]*)').exec(location.search);
    return m ? decodeURIComponent(m[1]) : '';
  }

  // JSONPでギフト情報を取得
  window.onGift = function(data){
    if(!data || data.error || data.state === undefined){
      return showState('🔍','ギフトが見つかりません','コードをご確認のうえ、お手数ですがお店までお問い合わせください。');
    }
    if(data.state === 'used')   return showState('✓','このギフトは使用済みです','すでにご利用いただいたギフト券です。');
    if(data.state === 'expired')return showState('⏳','有効期限が過ぎています','大変申し訳ございません。お店までご相談ください。');
    giftData = data;
    showOpening();
  };

  (function init(){
    var code = getParam('code');
    if(!code){ return showState('✦','ギフトページ','こちらは贈り物専用ページです。受け取ったリンクからお開きください。'); }
    var s = document.createElement('script');
    s.src = GAS_API_URL + '?api=gift&code=' + encodeURIComponent(code) + '&callback=onGift';
    s.onerror = function(){ showState('⚠','読み込みに失敗しました','通信環境をご確認のうえ、再度お試しください。'); };
    document.body.appendChild(s);
  })();

  function showOpening(){
    document.getElementById('loading').style.display = 'none';
    document.getElementById('opening').style.display = 'flex';
  }

  function openCard(){
    var d = giftData;
    document.getElementById('cName').textContent   = d.menu;
    document.getElementById('cMenu').textContent   = d.menu;
    document.getElementById('cExpiry').textContent = d.expiry;
    document.getElementById('cCode').textContent   = getParam('code');
    document.getElementById('cReserve').href       = d.reserveUrl || '#';
    document.getElementById('cLine').href          = d.lineUrl || '#';
    if(d.message){
      document.getElementById('cMsg').textContent  = d.message;
      document.getElementById('cFrom').textContent = d.sender ? ('— ' + d.sender + ' より') : '';
      document.getElementById('cMsgBox').style.display = 'block';
    }
    document.getElementById('opening').style.display = 'none';
    document.getElementById('card').style.display = 'block';
  }

  function showState(ic,t,d){
    document.getElementById('loading').style.display = 'none';
    document.getElementById('opening').style.display = 'none';
    document.getElementById('card').style.display = 'none';
    document.getElementById('sIc').textContent = ic;
    document.getElementById('sT').textContent = t;
    document.getElementById('sD').textContent = d;
    document.getElementById('state').style.display = 'block';
  }
</script>
</body>
</html>
